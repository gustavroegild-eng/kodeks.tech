<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODEKS.TECH | Jura & Teknologi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { yellow: '#EAB308', yellowHover: '#CA8A04' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .yellow-highlight { position: relative; z-index: 1; display: inline-block; }
        .yellow-highlight::after { content: ''; position: absolute; bottom: 6px; left: -2px; right: -2px; height: 30%; background-color: #EAB308; opacity: 0.25; z-index: -1; border-radius: 2px; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 h-20">
        <div class="max-w-4xl mx-auto px-6 h-full flex justify-between items-center">
            <a href="#" onclick="navigateTo('home')" class="text-xl font-bold tracking-tight">KODEKS<span class="text-brand-yellow">.</span>TECH</a>
            <div class="hidden md:flex items-center space-x-8 text-xs font-bold uppercase tracking-wider text-slate-500">
                <button onclick="navigateTo('articles')" class="hover:text-brand-yellow transition">Medie</button>
                <button onclick="navigateTo('courses')" class="hover:text-brand-yellow transition">Akademi</button>
                <button onclick="navigateTo('pricing')" class="hover:text-brand-yellow transition">Priser</button>
                <button onclick="navigateTo('contact')" class="px-5 py-2.5 bg-slate-900 text-white rounded-lg hover:bg-slate-800 transition">Kontakt</button>
            </div>
        </div>
    </nav>

    <main class="pt-32">
        <section id="home" class="page-section active fade-in px-6">
            <div class="max-w-4xl mx-auto py-20">
                <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-8">Klarhed i et <br><span class="yellow-highlight italic">komplekst</span> marked.</h1>
                <p class="text-xl text-slate-600 max-w-2xl mb-10 leading-relaxed">Indsigt i tech-jura fra din Supabase-database.</p>
                <button onclick="navigateTo('articles')" class="px-8 py-4 bg-brand-yellow text-white font-bold rounded-xl shadow-lg hover:bg-brand-yellowHover transition">Gå til artikler</button>
            </div>
        </section>

        <section id="articles" class="page-section fade-in px-6">
            <div class="max-w-3xl mx-auto py-20">
                <h2 class="text-4xl font-bold mb-12">Nyheder & Analyser</h2>
                <div id="article-list" class="space-y-6">Laster artikler...</div>
            </div>
        </section>

        <section id="courses" class="page-section fade-in px-6">
            <div class="max-w-3xl mx-auto py-20">
                <h2 class="text-4xl font-bold mb-12">Akademi</h2>
                <div id="course-list" class="space-y-6">Laster kurser...</div>
            </div>
        </section>

        <section id="article-detail" class="page-section fade-in px-6">
            <div class="max-w-2xl mx-auto py-20">
                <button onclick="navigateTo('articles')" class="text-slate-400 hover:text-brand-yellow mb-8 flex items-center gap-2 transition font-semibold">← Tilbage</button>
                <div id="article-content"></div>
            </div>
        </section>

        <section id="course-detail" class="page-section fade-in px-6">
            <div class="max-w-3xl mx-auto py-20">
                <button onclick="navigateTo('courses')" class="text-slate-400 hover:text-brand-yellow mb-8 flex items-center gap-2 transition font-semibold">← Tilbage</button>
                <div id="course-content"></div>
            </div>
        </section>

        <section id="contact" class="page-section fade-in px-6">
            <div class="max-w-xl mx-auto py-20 border border-slate-100 rounded-3xl p-10 bg-slate-50 text-center">
                <h2 class="text-3xl font-bold mb-6">Kontakt os</h2>
                <p class="text-slate-500 mb-8 font-bold">hello@kodeks.tech</p>
                <button onclick="navigateTo('home')" class="px-8 py-3 bg-slate-900 text-white rounded-xl">Tilbage til start</button>
            </div>
        </section>
    </main>

    <footer class="mt-20 border-t border-slate-100 bg-slate-50 py-12 px-6 text-center">
        <span class="text-xl font-bold tracking-tighter uppercase">KODEKS.TECH</span>
    </footer>

    <script>
        // 2. SUPABASE KONFIGURATION (Dine nøgler)
        const SUPABASE_URL = 'https://rrggbjvyefvctkqnmfyf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6F-gDnKDQ4Z7crZkuCuiLw_EL7W8-zv';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DATA CONTAINERS (Gemmer data lokalt efter hentning)
        let localArticles = [];
        let localCourses = [];

        function navigateTo(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 3. HENT DATA FRA SUPABASE
        async function loadData() {
            // Hent Artikler
            const { data: articles, error: artErr } = await _supabase.from('articles').select('*');
            if (articles) {
                localArticles = articles;
                renderArticles();
            }

            // Hent Kurser
            const { data: courses, error: courErr } = await _supabase.from('courses').select('*');
            if (courses) {
                localCourses = courses;
                renderCourses();
            }
        }

        function renderArticles() {
            const list = document.getElementById('article-list');
            list.innerHTML = '';
            localArticles.forEach(art => {
                list.innerHTML += `
                    <div onclick="openArticle(${art.id})" class="group p-8 border border-slate-100 rounded-2xl hover:border-brand-yellow transition-all cursor-pointer bg-white">
                        <div class="text-xs font-bold text-brand-yellow uppercase mb-2">${art.category} • ${art.date}</div>
                        <h3 class="text-2xl font-bold mb-3">${art.title}</h3>
                        <p class="text-slate-600 mb-4">${art.excerpt}</p>
                        <div class="text-slate-900 font-bold text-sm">Læs artiklen →</div>
                    </div>`;
            });
        }

        function renderCourses() {
            const list = document.getElementById('course-list');
            list.innerHTML = '';
            localCourses.forEach(c => {
                list.innerHTML += `
                    <div onclick="openCourse(${c.id})" class="p-8 border border-slate-100 rounded-2xl bg-white hover:border-brand-yellow transition-all cursor-pointer">
                        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                            <div>
                                <span class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase mb-2 inline-block">${c.type}</span>
                                <h3 class="text-2xl font-bold">${c.title}</h3>
                                <p class="text-slate-400 text-sm mt-1">Pris: ${c.price}</p>
                            </div>
                            <div class="text-brand-yellow font-bold">Se kursus →</div>
                        </div>
                    </div>`;
            });
        }

        // 4. ÅBN DETALJER
        function openArticle(id) {
            const art = localArticles.find(a => a.id === id);
            document.getElementById('article-content').innerHTML = `
                <h1 class="text-4xl md:text-5xl font-bold mb-8">${art.title}</h1>
                <div class="text-lg text-slate-600 leading-relaxed">${art.content}</div>
            `;
            navigateTo('article-detail');
        }

        function openCourse(id) {
            const c = localCourses.find(item => item.id === id);
            document.getElementById('course-content').innerHTML = `
                <h1 class="text-4xl font-bold mb-6">${c.title}</h1>
                <p class="text-xl text-slate-600 mb-10">${c.description || 'Ingen beskrivelse tilgængelig.'}</p>
                <div class="p-8 bg-slate-50 rounded-2xl border border-slate-200">
                    <div class="text-3xl font-bold mb-4">${c.price}</div>
                    <button onclick="navigateTo('contact')" class="px-8 py-3 bg-brand-yellow text-white rounded-xl font-bold">Tilmeld mig</button>
                </div>
            `;
            navigateTo('course-detail');
        }

        // KØR VED START
        loadData();
    </script>
</body>
</html>
